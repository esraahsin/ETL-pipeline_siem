# =============================================================================
# SIEM Minimal Stack — Kafka + Elasticsearch + Kibana + Spark Streaming
# No Airflow, no batch DAGs, no MinIO, no Grafana.
#
# Usage:
#   docker compose -f docker/docker-compose.minimal.yml up -d
#
# Kibana will be available at http://localhost:5601
# =============================================================================

services:

  # === KAFKA ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: siem-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: siem-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # === ELASTICSEARCH + KIBANA ===
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: siem-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  # === SPARK STREAMING JOB ===
  # Reads from all 4 Kafka topics, enriches events (GeoIP + severity),
  # and indexes them into Elasticsearch. No MinIO dependency.
  spark-streaming:
    image: apache/spark:3.5.1
    container_name: siem-spark-streaming
    user: root
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - SPARK_APP_NAME=SIEM-ETL-Streaming
      - PYTHONPATH=/opt/spark
      - MAXMIND_DB_PATH=/opt/geoip/GeoLite2-City.mmdb
    volumes:
      - ../spark_jobs:/opt/spark/spark_jobs
      - ../spark_jobs.zip:/opt/spark/spark_jobs.zip
      - ../geoip:/opt/geoip
    command: >
      /bin/bash -c "
        pip install boto3==1.34.0 elasticsearch==8.11.0 structlog==23.2.0 geoip2==4.7.0 --quiet &&
        spark-submit
          --master local[2]
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
          --conf spark.driver.extraJavaOptions=-Dlog4j.rootCategory=WARN,console
          /opt/spark/spark_jobs/streaming_job.py
      "
    restart: on-failure

  # === LOG GENERATORS ===
  generator-firewall:
    image: python:3.10-slim
    container_name: siem-generator-firewall
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_FIREWALL=firewall-logs
      - GENERATOR_INTERVAL_SECONDS=1
      - GENERATOR_BATCH_SIZE=10
    command: >
      /bin/bash -c "
        pip install kafka-python==2.0.2 structlog==23.2.0 faker==20.1.0 tenacity==8.2.3 --quiet &&
        python generators/firewall_generator.py
      "
    restart: on-failure

  generator-webserver:
    image: python:3.10-slim
    container_name: siem-generator-webserver
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_WEBSERVER=web-logs
      - GENERATOR_INTERVAL_SECONDS=1
      - GENERATOR_BATCH_SIZE=10
    command: >
      /bin/bash -c "
        pip install kafka-python==2.0.2 structlog==23.2.0 faker==20.1.0 tenacity==8.2.3 --quiet &&
        python generators/webserver_generator.py
      "
    restart: on-failure

  generator-windows:
    image: python:3.10-slim
    container_name: siem-generator-windows
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_WINDOWS=windows-logs
      - GENERATOR_INTERVAL_SECONDS=1
      - GENERATOR_BATCH_SIZE=10
    command: >
      /bin/bash -c "
        pip install kafka-python==2.0.2 structlog==23.2.0 faker==20.1.0 tenacity==8.2.3 --quiet &&
        python generators/windows_generator.py
      "
    restart: on-failure

  generator-ids:
    image: python:3.10-slim
    container_name: siem-generator-ids
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_IDS=ids-logs
      - GENERATOR_INTERVAL_SECONDS=1
      - GENERATOR_BATCH_SIZE=10
    command: >
      /bin/bash -c "
        pip install kafka-python==2.0.2 structlog==23.2.0 faker==20.1.0 tenacity==8.2.3 --quiet &&
        python generators/ids_generator.py
      "
    restart: on-failure

volumes:
  es_data:
