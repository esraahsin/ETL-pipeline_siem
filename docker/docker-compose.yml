services:
  # === KAFKA ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: siem-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: siem-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: siem-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: siem-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # === ELASTICSEARCH + KIBANA ===
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: siem-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  # === MINIO (DATA LAKE) ===
  minio:
    image: minio/minio:latest
    container_name: siem-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # === AIRFLOW ===
  postgres:
    image: postgres:15
    container_name: siem-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.8.0
    container_name: siem-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    entrypoint: /bin/bash -c "airflow db migrate && airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: siem-airflow-webserver
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      ELASTICSEARCH_HOST: elasticsearch        # ← ADD
      ELASTICSEARCH_PORT: "9200"               # ← ADD
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092     # ← ADD
      MINIO_ENDPOINT: minio:9000              # ← ADD
      MINIO_ACCESS_KEY: minioadmin            # ← ADD
      MINIO_SECRET_KEY: minioadmin            # ← ADD
      MINIO_BUCKET_RAW: siem-raw-logs         # ← ADD
    volumes:
      - ../dags:/opt/airflow/dags
    command: airflow webserver

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: siem-airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      ELASTICSEARCH_HOST: elasticsearch        # ← ADD
      ELASTICSEARCH_PORT: "9200"               # ← ADD
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092     # ← ADD
      MINIO_ENDPOINT: minio:9000              # ← ADD
      MINIO_ACCESS_KEY: minioadmin            # ← ADD
      MINIO_SECRET_KEY: minioadmin            # ← ADD
      MINIO_BUCKET_RAW: siem-raw-logs         # ← ADD
    volumes:
      - ../dags:/opt/airflow/dags
    command: airflow scheduler
  # === SPARK ===
  spark-master:
    image: apache/spark:3.5.1
    container_name: siem-spark-master
    ports:
      - "7077:7077"
      - "8082:8080"
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=/opt/spark
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ELASTICSEARCH_HOST=elasticsearch
    volumes:
      - ../spark_jobs:/opt/spark/spark_jobs   # ← ADD
    command: >
      /bin/bash -c "pip install boto3 elasticsearch &&
      /opt/spark/sbin/start-master.sh &&
      tail -f /opt/spark/logs/*"
    user: root

  spark-worker:
    image: apache/spark:3.5.1
    container_name: siem-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ../spark_jobs:/opt/spark/spark_jobs   # ← ADD
    command: >
      /bin/bash -c "pip install boto3 elasticsearch &&
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /opt/spark/logs/*"
    user: root

  
  # === GRAFANA ===
  grafana:
    image: grafana/grafana:latest
    container_name: siem-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  es_data:
  minio_data:
  postgres_data:
  grafana_data: